name: build

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-26]
        compiler: [gcc, clang]
        crypto: [openssl, gnutls]
        bittorrent: [with-bt, without-bt]
        exclude:
        - os: macos-26
          crypto: gnutls
        - crypto: openssl
          bittorrent: without-bt

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Linux setup
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install \
          g++-14 \
          clang-18 \
          autoconf \
          automake \
          autotools-dev \
          autopoint \
          libtool \
          pkg-config \
          libssl-dev \
          libgnutls28-dev \
          libc-ares-dev \
          zlib1g-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libcppunit-dev
    - name: MacOS setup
      if: runner.os == 'macOS'
      run: |
        brew install cppunit gettext openssl libssh2 c-ares sqlite3 \
          autoconf automake pkg-config libtool
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: ${{ matrix.os }}-${{ matrix.compiler }}-${{ matrix.crypto }}-${{ matrix.bittorrent }}
    - name: Setup clang (Linux)
      if: runner.os == 'Linux' && matrix.compiler == 'clang'
      run: |
        echo 'CC=clang-18' >> $GITHUB_ENV
        echo 'CXX=clang++-18' >> $GITHUB_ENV
        echo 'CXXFLAGS=-nostdinc++ -isystem /usr/include/c++/14 -isystem /usr/include/x86_64-linux-gnu/c++/14' >> $GITHUB_ENV
    - name: Setup clang (MacOS)
      if: runner.os == 'macOS' && matrix.compiler == 'clang'
      run: |
        echo 'CC=clang' >> $GITHUB_ENV
        echo 'CXX=clang++' >> $GITHUB_ENV
    - name: Setup gcc (Linux)
      if: runner.os == 'Linux' && matrix.compiler == 'gcc'
      run: |
        echo 'CC=gcc-14' >> $GITHUB_ENV
        echo 'CXX=g++-14' >> $GITHUB_ENV
    - name: Setup gcc (MacOS)
      if: runner.os == 'macOS' && matrix.compiler == 'gcc'
      run: |
        echo 'CC=gcc' >> $GITHUB_ENV
        echo 'CXX=g++' >> $GITHUB_ENV
    - name: Libtool
      run: |
        autoreconf -i
    - name: Setup compiler flags
      run: |
        asanflags="-fsanitize=address,undefined -fno-sanitize-recover=undefined"

        CPPFLAGS="$asanflags -g3"
        LDFLAGS="$asanflags"

        echo 'CPPFLAGS='"$CPPFLAGS" >> $GITHUB_ENV
        echo 'LDFLAGS='"$LDFLAGS" >> $GITHUB_ENV
        echo "/usr/lib/ccache:/opt/homebrew/opt/ccache/libexec" >> $GITHUB_PATH
    - name: Disable BitTorrent
      if: matrix.bittorrent == 'without-bt'
      run: |
        FEATURE_FLAGS="$FEATURE_FLAGS --disable-bittorrent"

        echo 'FEATURE_FLAGS='"$FEATURE_FLAGS" >> $GITHUB_ENV
    - name: Configure autotools (Linux, gnutls)
      if: runner.os == 'Linux' && matrix.crypto == 'gnutls'
      run: |
        ./configure --with-gnutls --without-openssl $FEATURE_FLAGS
    - name: Configure autotools (Linux, openssl)
      if: runner.os == 'Linux' && matrix.crypto == 'openssl'
      run: |
        ./configure --without-gnutls --with-openssl $FEATURE_FLAGS
    - name: Configure autotools (macOS)
      if: runner.os == 'macOS'
      run: |
        ./configure \
          --without-openssl --without-gnutls --with-appletls \
          --disable-nls
    - name: Build aria2
      run: |
        make -j"$(nproc 2> /dev/null || sysctl -n hw.ncpu)" check
    - name: Run e2e tests
      run: make -C test check-e2e

  # ASan is not supported with MinGW gcc, so no sanitizer flags here.
  build-windows:
    strategy:
      matrix:
        bittorrent: [with-bt, without-bt]
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cppunit
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-c-ares
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-libssh2
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-libxml2
          autoconf
          automake
          libtool
          make
          pkg-config
          gettext-devel
    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: windows-${{ matrix.bittorrent }}
    - name: Disable BitTorrent
      if: matrix.bittorrent == 'without-bt'
      run: |
        echo 'FEATURE_FLAGS=--disable-bittorrent' >> $GITHUB_ENV
    - name: Build and test
      run: |
        autoreconf -i --no-recursive
        ./configure \
          --without-gnutls --with-openssl --with-libxml2 \
          --with-libcares --with-sqlite3 --with-libssh2 \
          $FEATURE_FLAGS
        make -j$(nproc) check

  build-tsan:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Linux setup
      run: |
        sudo apt-get update
        sudo apt-get install \
          g++-14 \
          autoconf \
          automake \
          autotools-dev \
          autopoint \
          libtool \
          pkg-config \
          libssl-dev \
          libc-ares-dev \
          zlib1g-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libcppunit-dev
    - name: Libtool
      run: |
        autoreconf -i
    - name: Configure
      run: |
        ./configure \
          --without-gnutls --with-openssl \
          CC=gcc-14 CXX=g++-14
      env:
        CPPFLAGS: "-fsanitize=thread -g3"
        LDFLAGS: "-fsanitize=thread"
    - name: Build and test
      run: |
        make -j"$(nproc)" check
      env:
        TSAN_OPTIONS: "halt_on_error=1"
