name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'release-*'

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.21
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        apk add --no-cache \
          build-base autoconf automake libtool pkgconf gettext-dev \
          openssl-dev openssl-libs-static c-ares-dev \
          zlib-dev zlib-static sqlite-dev sqlite-static \
          libssh2-dev libssh2-static libxml2-dev libxml2-static \
          brotli-dev brotli-static zstd-dev zstd-static \
          xz-dev xz-static
    - name: Build static binary
      run: |
        autoreconf -i
        ./configure \
          --without-gnutls --with-openssl \
          --with-libcares --with-sqlite3 --with-libssh2 \
          --with-libxml2 --disable-nls \
          ARIA2_STATIC=yes \
          LDFLAGS="-L/usr/lib"
        make -j$(nproc)
        strip src/aria2c
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-x86_64
        path: src/aria2c

  linux-aarch64:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: uraimo/run-on-arch-action@v3
      with:
        arch: aarch64
        distro: alpine_latest
        run: |
          apk add --no-cache \
            build-base autoconf automake libtool pkgconf gettext-dev \
            openssl-dev openssl-libs-static c-ares-dev \
            zlib-dev zlib-static sqlite-dev sqlite-static \
            libssh2-dev libssh2-static libxml2-dev libxml2-static \
            brotli-dev brotli-static zstd-dev zstd-static \
            xz-dev xz-static
          autoreconf -i
          ./configure \
            --without-gnutls --with-openssl \
            --with-libcares --with-sqlite3 --with-libssh2 \
            --with-libxml2 --disable-nls \
            ARIA2_STATIC=yes \
            LDFLAGS="-L/usr/lib"
          make -j$(nproc)
          strip src/aria2c
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-aarch64
        path: src/aria2c

  macos-arm64:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        brew install autoconf automake libtool pkgconf \
          openssl@3 c-ares libssh2 sqlite libxml2 brotli zstd
    - name: Build
      run: |
        autoreconf -i
        ./configure \
          --without-gnutls --with-openssl \
          --with-libcares --with-sqlite3 --with-libssh2 \
          --disable-nls \
          PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix sqlite)/lib/pkgconfig:$(brew --prefix c-ares)/lib/pkgconfig:$(brew --prefix libssh2)/lib/pkgconfig:$(brew --prefix libxml2)/lib/pkgconfig"
        make -j$(sysctl -n hw.ncpu)
        strip src/aria2c
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-macos-arm64
        path: src/aria2c

  android-aarch64:
    runs-on: ubuntu-24.04
    env:
      NDK_VERSION: r27c
      API_LEVEL: "24"
    steps:
    - uses: actions/checkout@v6
    - name: Install host tools
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool pkg-config gettext
    - name: Setup NDK
      run: |
        wget -q "https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux.zip"
        unzip -q "android-ndk-${NDK_VERSION}-linux.zip"
        echo "NDK_HOME=$PWD/android-ndk-${NDK_VERSION}" >> $GITHUB_ENV
    - name: Build dependencies and aria2
      run: |
        export TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
        export PATH="$TOOLCHAIN/bin:$PATH"
        export ANDROID_NDK_HOME="$NDK_HOME"
        export ANDROID_NDK_ROOT="$NDK_HOME"
        export TARGET=aarch64-linux-android
        export CC="${TARGET}${API_LEVEL}-clang"
        export CXX="${TARGET}${API_LEVEL}-clang++"
        export AR="llvm-ar"
        export RANLIB="llvm-ranlib"
        export STRIP="llvm-strip"
        export SYSROOT="$TOOLCHAIN/sysroot"
        export PREFIX="$PWD/android-deps"
        export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
        export CFLAGS="-O2 -fPIC"
        export CXXFLAGS="-O2 -fPIC"
        export LDFLAGS="-L$PREFIX/lib"
        export CPPFLAGS="-I$PREFIX/include"
        mkdir -p "$PREFIX"

        # Build OpenSSL
        wget -q https://github.com/openssl/openssl/releases/download/openssl-3.4.1/openssl-3.4.1.tar.gz
        tar xzf openssl-3.4.1.tar.gz && cd openssl-3.4.1
        ./Configure android-arm64 no-shared --prefix="$PREFIX" \
          -D__ANDROID_API__=$API_LEVEL
        make -j$(nproc) && make install_sw
        cd ..

        # Build c-ares
        wget -q https://github.com/c-ares/c-ares/releases/download/v1.34.4/c-ares-1.34.4.tar.gz
        tar xzf c-ares-1.34.4.tar.gz && cd c-ares-1.34.4
        ./configure --host=$TARGET --prefix="$PREFIX" \
          --disable-shared --enable-static
        make -j$(nproc) && make install
        cd ..

        # Build zlib
        wget -q https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz
        tar xzf zlib-1.3.1.tar.gz && cd zlib-1.3.1
        ./configure --prefix="$PREFIX" --static
        make -j$(nproc) && make install
        cd ..

        # Build aria2 (bypass gettext/autopoint — NLS is disabled)
        touch config.rpath ABOUT-NLS
        mkdir -p po
        printf 'all install install-data install-exec uninstall:\nclean distclean mostlyclean maintainer-clean:\ncheck installcheck dvi pdf ps info html tags ctags:\n' > po/Makefile.in.in
        AUTOPOINT=true autoreconf -i
        ./configure \
          --host=$TARGET \
          --with-openssl --without-gnutls \
          --with-libcares --without-sqlite3 --without-libssh2 \
          --without-libxml2 --without-libexpat \
          --disable-nls --disable-websocket \
          --without-libzstd --without-libbrotlidec \
          --disable-shared --enable-static \
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig" \
          CPPFLAGS="-I$PREFIX/include" \
          LDFLAGS="-L$PREFIX/lib -static"
        make -j$(nproc)
        $STRIP src/aria2c
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-android-aarch64
        path: src/aria2c

  windows-x86_64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-c-ares
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-libssh2
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-libxml2
          mingw-w64-x86_64-brotli
          mingw-w64-x86_64-zstd
          autoconf
          automake
          libtool
          make
          pkg-config
          gettext-devel
    - name: Build
      run: |
        autoreconf -i --no-recursive
        ./configure \
          --without-gnutls --with-openssl --with-libxml2 \
          --with-libcares --with-sqlite3 --with-libssh2 \
          --disable-websocket --disable-nls \
          --disable-shared --enable-static
        make -j$(nproc)
        strip src/aria2c.exe
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows-x86_64
        path: src/aria2c.exe

  deb-x86_64:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++-14 autoconf automake autotools-dev autopoint libtool pkg-config \
          libssl-dev libc-ares-dev zlib1g-dev libsqlite3-dev \
          libssh2-1-dev libxml2-dev dpkg-dev
    - name: Build
      run: |
        autoreconf -i
        ./configure \
          --prefix=/usr \
          --without-gnutls --with-openssl \
          --with-libcares --with-sqlite3 --with-libssh2 \
          --with-libxml2 \
          CC=gcc-14 CXX=g++-14
        make -j$(nproc)
    - name: Package .deb
      run: |
        VERSION="${GITHUB_REF_NAME#release-}"
        PKG="aria2_${VERSION}_amd64"
        mkdir -p "$PKG/DEBIAN"
        mkdir -p "$PKG/usr/bin"
        mkdir -p "$PKG/usr/share/man/man1"
        mkdir -p "$PKG/usr/share/doc/aria2"
        cp src/aria2c "$PKG/usr/bin/"
        strip "$PKG/usr/bin/aria2c"
        cp doc/aria2c.1 "$PKG/usr/share/man/man1/" 2>/dev/null || true
        cp COPYING "$PKG/usr/share/doc/aria2/copyright"
        INSTALLED_SIZE=$(du -sk "$PKG/usr" | awk '{print $1}')
        printf 'Package: aria2\nVersion: %s\nSection: net\nPriority: optional\nArchitecture: amd64\nDepends: libssl3t64 | libssl3, libc-ares2, zlib1g, libsqlite3-0, libssh2-1t64 | libssh2-1, libxml2, libstdc++6\nInstalled-Size: %s\nMaintainer: Kenshin9977 <https://github.com/Kenshin9977>\nHomepage: https://github.com/Kenshin9977/aria2\nDescription: Lightweight multi-protocol download utility (modernised fork)\n aria2 is a lightweight multi-protocol & multi-source, cross-platform\n download utility. It supports HTTP(S), FTP, SFTP, BitTorrent, and\n Metalink. This is a modernised C++23 fork with HTTP/2, SOCKS5, HSTS,\n Brotli/Zstd decompression, and many performance improvements.\n' "$VERSION" "$INSTALLED_SIZE" > "$PKG/DEBIAN/control"
        dpkg-deb --build --root-owner-group "$PKG"
        mv "${PKG}.deb" "aria2-${VERSION}-amd64.deb"
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2-deb-x86_64
        path: aria2-*.deb

  create-release:
    needs: [linux-x86_64, linux-aarch64, macos-arm64, android-aarch64, windows-x86_64, deb-x86_64]
    runs-on: ubuntu-24.04
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Prepare release assets
      run: |
        mkdir -p release
        cp artifacts/aria2c-linux-x86_64/aria2c   release/aria2c-linux-x86_64
        cp artifacts/aria2c-linux-aarch64/aria2c   release/aria2c-linux-aarch64
        cp artifacts/aria2c-macos-arm64/aria2c     release/aria2c-macos-arm64
        cp artifacts/aria2c-android-aarch64/aria2c release/aria2c-android-aarch64
        cp artifacts/aria2c-windows-x86_64/aria2c.exe release/aria2c-windows-x86_64.exe
        cp artifacts/aria2-deb-x86_64/*.deb release/
        cd release && sha256sum * > SHA256SUMS
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: release/*

  update-homebrew:
    needs: [create-release]
    runs-on: ubuntu-24.04
    steps:
    - name: Update Homebrew formula
      env:
        GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      run: |
        VERSION="${GITHUB_REF_NAME#release-}"
        TARBALL="https://github.com/Kenshin9977/aria2/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
        SHA256=$(curl -sL "$TARBALL" | sha256sum | awk '{print $1}')
        git clone https://x-access-token:${GH_TOKEN}@github.com/Kenshin9977/homebrew-tap.git
        cd homebrew-tap
        sed -i "s|url \".*\"|url \"${TARBALL}\"|" Formula/aria2.rb
        sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/aria2.rb
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Formula/aria2.rb
        git commit -m "Update aria2 to ${VERSION}"
        git push
