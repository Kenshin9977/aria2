name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    container:
      image: alpine:3.21
    steps:
    - uses: actions/checkout@v6
    - name: Install build dependencies
      run: |
        apk add --no-cache \
          build-base autoconf automake libtool pkgconf gettext-dev \
          openssl-dev openssl-libs-static c-ares-dev \
          zlib-dev zlib-static sqlite-dev sqlite-static \
          libssh2-dev libssh2-static libxml2-dev libxml2-static \
          brotli-dev brotli-static zstd-dev zstd-static \
          xz-dev xz-static
    - name: Build static binary
      run: |
        autoreconf -i
        ./configure \
          --without-gnutls --with-openssl \
          --with-libcares --with-sqlite3 --with-libssh2 \
          --with-libxml2 --disable-nls \
          ARIA2_STATIC=yes \
          LDFLAGS="-L/usr/lib"
        make -j$(nproc)
        strip src/aria2c
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-x86_64
        path: src/aria2c

  linux-aarch64:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: uraimo/run-on-arch-action@v3
      with:
        arch: aarch64
        distro: alpine_latest
        run: |
          apk add --no-cache \
            build-base autoconf automake libtool pkgconf gettext-dev \
            openssl-dev openssl-libs-static c-ares-dev \
            zlib-dev zlib-static sqlite-dev sqlite-static \
            libssh2-dev libssh2-static libxml2-dev libxml2-static \
            brotli-dev brotli-static zstd-dev zstd-static \
            xz-dev xz-static
          autoreconf -i
          ./configure \
            --without-gnutls --with-openssl \
            --with-libcares --with-sqlite3 --with-libssh2 \
            --with-libxml2 --disable-nls \
            ARIA2_STATIC=yes \
            LDFLAGS="-L/usr/lib"
          make -j$(nproc)
          strip src/aria2c
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-linux-aarch64
        path: src/aria2c

  macos-arm64:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v6
    - name: Install dependencies
      run: |
        brew install autoconf automake libtool pkgconf \
          openssl@3 c-ares libssh2 sqlite libxml2 brotli zstd
    - name: Build
      run: |
        autoreconf -i
        ./configure \
          --without-gnutls --with-openssl \
          --with-libcares --with-sqlite3 --with-libssh2 \
          --disable-nls \
          PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig:$(brew --prefix sqlite)/lib/pkgconfig:$(brew --prefix c-ares)/lib/pkgconfig:$(brew --prefix libssh2)/lib/pkgconfig:$(brew --prefix libxml2)/lib/pkgconfig"
        make -j$(sysctl -n hw.ncpu)
        strip src/aria2c
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-macos-arm64
        path: src/aria2c

  windows-x86_64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-c-ares
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-libssh2
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-libxml2
          mingw-w64-x86_64-brotli
          mingw-w64-x86_64-zstd
          autoconf
          automake
          libtool
          make
          pkg-config
          gettext-devel
    - name: Build
      run: |
        autoreconf -i --no-recursive
        ./configure \
          --without-gnutls --with-openssl --with-libxml2 \
          --with-libcares --with-sqlite3 --with-libssh2 \
          --disable-websocket --disable-nls
        make -j$(nproc)
        strip src/aria2c.exe
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: aria2c-windows-x86_64
        path: src/aria2c.exe

  create-release:
    needs: [linux-x86_64, linux-aarch64, macos-arm64, windows-x86_64]
    runs-on: ubuntu-24.04
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Prepare release assets
      run: |
        mkdir -p release
        cp artifacts/aria2c-linux-x86_64/aria2c   release/aria2c-linux-x86_64
        cp artifacts/aria2c-linux-aarch64/aria2c   release/aria2c-linux-aarch64
        cp artifacts/aria2c-macos-arm64/aria2c     release/aria2c-macos-arm64
        cp artifacts/aria2c-windows-x86_64/aria2c.exe release/aria2c-windows-x86_64.exe
        cd release && sha256sum * > SHA256SUMS
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: release/*
